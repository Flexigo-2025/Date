<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>One Tiny Question ❤️</title>

  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>
</head>

<body>

<div class="screen active" id="screen1">
  <div class="card">
    <h1>Hey you 👀</h1>
    <p>A tiny question is waiting...</p>
    <button onclick="next(2)">Open 💌</button>
  </div>
</div>

<div class="screen" id="screen2">
  <div class="card">
    <p id="typeText"></p>
    <button onclick="next(3)">Continue ❤️</button>
  </div>
</div>

<div class="screen" id="screen3">
  <div class="card">
    <h2>Will you go on a date with me? 🌹</h2>

    <div class="btnRow">
      <button id="yesBtn" onclick="yes()">YES ❤️</button>
      <button id="noBtn" onclick="no()">No 🙈</button>
    </div>

    <p id="reaction"></p>
  </div>
</div>

<div class="screen" id="screen4">
  <div class="card">
    <h2>📅 Plan Our Date</h2>

    <input type="date" id="date"/>
    <input type="time" id="time"/>

    <h3>Choose Type</h3>

    <div class="grid" id="activities"></div>

    <h3>Complimentary 💞</h3>

    <div class="grid" id="comp"></div>

    <textarea id="note" placeholder="A sweet note..."></textarea>

    <button onclick="confirmDate()">Confirm 💖</button>
  </div>
</div>

<div class="screen" id="screen5">
  <div class="card">
    <h1>💖 DATE CONFIRMED</h1>

    <div id="summary"></div>

    <button onclick="download()">📸 Download Pass</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
